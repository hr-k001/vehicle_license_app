server.port=8080
spring.application.name=vehicle-license-app
spring.config.import=optional:file:.env[.properties]

# MySQL Database (Local Development)
# Set DB_PASSWORD in your local environment before running the app.
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/vehicle_license_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}

# JPA / Hibernate
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Logging
logging.level.root=INFO
logging.level.com.online=DEBUG
logging.level.org.hibernate.SQL=DEBUG
